<svg width="32" height="32" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C7A7B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38B2AC;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="24" cy="24" r="23" fill="#F7FAFC" stroke="#2C7A7B" stroke-width="2"/>
  
  <!-- Medical Cross -->
  <rect x="21" y="12" width="6" height="24" fill="url(#faviconGradient)" rx="1" />
  <rect x="15" y="18" width="18" height="6" fill="url(#faviconGradient)" rx="1" />
  
  <!-- AI Circuit Nodes -->
  <circle cx="16" cy="16" r="2" fill="#2C7A7B" opacity="0.8" />
  <circle cx="32" cy="16" r="2" fill="#2C7A7B" opacity="0.8" />
  <circle cx="16" cy="32" r="2" fill="#2C7A7B" opacity="0.8" />
  <circle cx="32" cy="32" r="2" fill="#2C7A7B" opacity="0.8" />
  
  <!-- Connecting Lines -->
  <line x1="16" y1="16" x2="21" y2="18" stroke="#38B2AC" stroke-width="1.5" opacity="0.6" />
  <line x1="32" y1="16" x2="27" y2="18" stroke="#38B2AC" stroke-width="1.5" opacity="0.6" />
  <line x1="16" y1="32" x2="21" y2="30" stroke="#38B2AC" stroke-width="1.5" opacity="0.6" />
  <line x1="32" y1="32" x2="27" y2="30" stroke="#38B2AC" stroke-width="1.5" opacity="0.6" />
</svg>